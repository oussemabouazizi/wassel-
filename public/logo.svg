<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF6B00"/>
      <stop offset="100%" style="stop-color:#FF8C33"/>
    </linearGradient>
    <linearGradient id="shine" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fff;stop-opacity:0.25"/>
      <stop offset="100%" style="stop-color:#fff;stop-opacity:0"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>
  <rect width="512" height="512" rx="112" fill="url(#shine)"/>
  <!-- Delivery box shape -->
  <g transform="translate(256,240)">
    <!-- Box body -->
    <rect x="-95" y="-50" width="190" height="130" rx="14" fill="#fff" fill-opacity="0.95"/>
    <!-- Box flap -->
    <path d="M-95,-50 L-95,-75 C-95,-82 -90,-88 -83,-88 L83,-88 C90,-88 95,-82 95,-75 L95,-50 Z" fill="#fff" fill-opacity="0.7"/>
    <!-- Tape line -->
    <rect x="-8" y="-88" width="16" height="130" rx="3" fill="#FF6B00" fill-opacity="0.3"/>
    <!-- W letter inside box -->
    <text x="0" y="52" text-anchor="middle" font-family="Inter,system-ui,-apple-system,sans-serif" font-weight="900" font-size="80" fill="#FF6B00" letter-spacing="-2">W</text>
  </g>
  <!-- Speed lines -->
  <g opacity="0.5">
    <rect x="60" y="170" width="40" height="5" rx="2.5" fill="#fff"/>
    <rect x="50" y="190" width="55" height="5" rx="2.5" fill="#fff"/>
    <rect x="65" y="210" width="35" height="5" rx="2.5" fill="#fff"/>
  </g>
</svg>
